<section class="trace-panel">
  <header>
    <p>Traceability Inspector</p>
    <h2>Explicit Semantic Links</h2>
  </header>

  <div class="trace-panel__summary">
    <span>Total links: {{ relationships.length }}</span>
    <span>Trace issues: {{ validationReport.byCategory.traceability.length }}</span>
  </div>

  <article *ngFor="let relationship of relationships" class="trace-card">
    <strong>{{ relationship.type }}</strong>
    <span>{{ relationship.sourceId }} -> {{ relationship.targetId }}</span>
    <p>{{ relationship.rationale }}</p>
  </article>
</section>
