<aside class="palette">
  <header class="panel-header">
    <div>
      <p class="panel-header__eyebrow">Palette</p>
      <h2>Semantic Building Blocks</h2>
    </div>
    <button type="button">Filter</button>
  </header>

  <label class="palette__search">
    <span>Search components</span>
    <input type="text" placeholder="Page, REST Call, Validation" />
  </label>

  <section class="palette__category" *ngFor="let category of palette">
    <header class="palette__category-header">
      <h3>{{ category.label }}</h3>
      <span>{{ category.items.length }}</span>
    </header>

    <button
      class="palette__item"
      type="button"
      draggable="true"
      *ngFor="let item of category.items"
      (dragstart)="onDragStart($event, item)">
      <span class="palette__icon" [class]="item.accent">{{ item.icon }}</span>
      <span class="palette__item-copy">
        <strong>{{ item.label }}</strong>
        <small>{{ item.description }}</small>
      </span>
    </button>
  </section>
</aside>
