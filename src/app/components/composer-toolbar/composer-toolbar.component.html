<header class="toolbar">
  <div class="toolbar__brand">
    <div class="toolbar__logo">DF</div>
    <div>
      <p class="toolbar__eyebrow">Semantic Application Composer</p>
      <h1>{{ modelName }}</h1>
    </div>
  </div>

  <div class="toolbar__status">
    <div class="toolbar__badge">
      <span class="toolbar__badge-label">Prototype Phase</span>
      <strong>Reference Modeling</strong>
    </div>
    <div class="toolbar__badge">
      <span class="toolbar__badge-label">Canvas Nodes</span>
      <strong>{{ nodeCount }}</strong>
    </div>
  </div>

  <div class="toolbar__actions">
    <button type="button" (click)="onValidateProjectClick()">Validate Project</button>
    <button type="button" (click)="onSaveProjectClick()">Save Project</button>
    <button type="button" (click)="onLoadProjectClick()">Load Project</button>
    <button type="button" (click)="onPreviewDslClick()">Preview DSL</button>
    <button type="button" class="toolbar__primary">Publish Structure</button>
  </div>
</header>
