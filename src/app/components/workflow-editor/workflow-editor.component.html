<section class="workflow-editor">
  <header class="workflow-editor__header">
    <div>
      <h1>Workflow Editor</h1>
      <p>Define the workflow and manage its steps.</p>
    </div>
    <button type="button" (click)="addStep()">Add step</button>
  </header>

  <form [formGroup]="workflowForm" class="workflow-editor__form" (ngSubmit)="saveWorkflow()">
    <label>
      <span>Name</span>
      <input type="text" formControlName="name">
    </label>

    <label>
      <span>Description</span>
      <textarea rows="3" formControlName="description"></textarea>
    </label>

    <button type="submit" [disabled]="workflowForm.invalid">Save workflow</button>
  </form>

  <ul class="workflow-editor__steps">
    <li *ngFor="let step of workflowSteps; trackBy: trackByStepId">
      <div>
        <strong>{{ step.name }}</strong>
        <span>{{ step.type }}</span>
        <p>{{ step.description }}</p>
      </div>
      <div class="workflow-editor__actions">
        <button type="button" (click)="editStep(step)">Edit</button>
        <button type="button" (click)="deleteStep(step.id)">Delete</button>
      </div>
    </li>
  </ul>

  <section class="workflow-editor__edit" *ngIf="isEditing">
    <p>Editing step {{ currentStepIndex !== null ? currentStepIndex + 1 : '' }}</p>
    <button type="button" (click)="saveStep()">Save step</button>
    <button type="button" (click)="cancelEdit()">Cancel</button>
  </section>
</section>
