version: "3.9"

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: darkfactor
      POSTGRES_USER: darkfactor
      POSTGRES_PASSWORD: darkfactor
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - postgres
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "4200:4200"

volumes:
  postgres-data:
